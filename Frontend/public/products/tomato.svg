    <radialGradient id="tom1" cx="40%" cy="35%"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#D32F2F"/></radialGradient>
    <radialGradient id="tom2" cx="40%" cy="35%"><stop offset="0%" stop-color="#EF5350"/><stop offset="100%" stop-color="#C62828"/></radialGradient>
